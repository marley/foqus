<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=340">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/variables.css">
    <link rel="stylesheet" href="popup.css">
    <script src="popup.js"></script>
  </head>
  <body>
    <header class="popup-header">
      <h1 class="popup-brand">foqus</h1>
    </header>
    <main id="main" class="popup-main">
      <div class="popup-input-section" data-mode="avoid">
        <div class="popup-mode-toggle" role="group" aria-label="Add to list type">
          <span class="popup-mode-slider" aria-hidden="true"></span>
          <button type="button" id="modeAvoid" class="popup-mode-btn popup-mode-btn--active" aria-pressed="true">avoid</button>
          <button type="button" id="modeVisit" class="popup-mode-btn" aria-pressed="false">visit</button>
        </div>
        <form id="siteForm">
          <div class="popup-input-row">
            <label for="siteInput" class="visually-hidden">Add a site</label>
            <input placeholder="example.com" type="text" name="siteInput" id="siteInput">
            <button type="submit" id="siteButton" class="popup-submit-btn" aria-label="Add site">+</button>
          </div>
        </form>
      </div>

      <div class="popup-accordion">
        <div class="popup-accordion-item popup-accordion-item--avoid">
          <button type="button" id="accordionAvoid" class="popup-accordion-header" aria-expanded="true" aria-controls="accordionAvoidBody">
            <span class="popup-accordion-label">
              <svg class="popup-accordion-icon-eye popup-accordion-icon-eye--avoid" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>Sites to avoid
            </span>
            <span class="popup-accordion-icon" aria-hidden="true">▾</span>
          </button>
          <div id="accordionAvoidBody" class="popup-accordion-body" role="region" aria-labelledby="accordionAvoid">
            <div class="popup-list-wrap">
              <ul id="avoidList"></ul>
              <p class="popup-empty-state" id="avoidEmptyState" hidden>No sites added yet</p>
            </div>
          </div>
        </div>
        <div class="popup-accordion-item popup-accordion-item--visit">
          <button type="button" id="accordionVisit" class="popup-accordion-header" aria-expanded="false" aria-controls="accordionVisitBody">
            <span class="popup-accordion-label">
              <svg class="popup-accordion-icon-eye popup-accordion-icon-eye--visit" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>Places to go instead
            </span>
            <span class="popup-accordion-icon" aria-hidden="true">▸</span>
          </button>
          <div id="accordionVisitBody" class="popup-accordion-body" role="region" aria-labelledby="accordionVisit" hidden>
            <div class="popup-list-wrap">
              <ul id="visitList"></ul>
              <p class="popup-empty-state" id="visitEmptyState" hidden>No sites added yet</p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div class="popup-settings">
      <div class="popup-settings-header">
        <button type="button" id="settingsToggle" class="popup-settings-toggle" aria-expanded="false"><span class="popup-settings-icon" aria-hidden="true">&#9881;</span> Settings</button>
        <span id="savedIndicator" class="popup-settings-saved" hidden>Saved!</span>
      </div>
      <div id="settingsDrawer" class="popup-settings-drawer" hidden>
        <h3>Unblock time limit</h3>
        <form id="limitForm">
          <label for="overrideLimitInput" class="visually-hidden">Unblock time limit in minutes</label>
          <input type="number" name="overrideLimitInput" id="overrideLimitInput" min="1" max="120" value="5" placeholder="5"> minutes
          <button type="submit" id="limitSaveButton" class="popup-settings-button">Save</button>
        </form>
        <div class="popup-settings-row">
          <label class="popup-toggle" for="preferReducedMotion">
            <input type="checkbox" id="preferReducedMotion" name="preferReducedMotion" class="popup-toggle-input">
            <span class="popup-toggle-track" aria-hidden="true">
              <span class="popup-toggle-thumb"></span>
            </span>
            <span class="popup-toggle-label">Prefer reduced motion</span>
          </label>
        </div>
        <div class="popup-settings-row">
          <label class="popup-toggle" for="darkMode">
            <input type="checkbox" id="darkMode" name="darkMode" class="popup-toggle-input">
            <span class="popup-toggle-track" aria-hidden="true">
              <span class="popup-toggle-thumb"></span>
            </span>
            <span class="popup-toggle-label">Dark mode</span>
          </label>
        </div>
        <h3 class="popup-settings-subheading">Block screen message</h3>
        <form id="overlayTitleForm">
          <label for="overlayTitleInput" class="visually-hidden">Custom block screen message</label>
          <input type="text" name="overlayTitleInput" id="overlayTitleInput" placeholder="You shall not pass.">
          <button type="submit" id="overlayTitleSaveButton" class="popup-settings-button">Save</button>
        </form>
      </div>
    </div>
    <footer class="popup-footer">
      <a href="https://ko-fi.com/foqus" target="_blank" rel="noopener noreferrer" class="popup-ko-fi">♥ Support Foqus on Ko-fi</a>
    </footer>
  </body>
</html>
